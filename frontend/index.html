<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPU Scheduling Simulator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>CPU Scheduling Simulator</h1>
        
        <div class="controls">
            <div class="control-group">
                <label for="algorithm">Algorithm:</label>
                <select id="algorithm">
                    <option value="fcfs">FCFS</option>
                    <option value="sjf_preemptive">SJF Preemptive</option>
                    <option value="priority_preemptive">Priority Preemptive</option>
                    <option value="round_robin">Round Robin</option>
                </select>
            </div>
            
            <div class="control-group" id="tq-container" style="display: none;">
                <label for="time-quantum">Time Quantum:</label>
                <input type="number" id="time-quantum" min="1" value="2">
            </div>
        </div>
        
        <h2>Processes</h2>
        <table id="process-table">
            <thead>
                <tr>
                    <th>PID</th>
                    <th>Arrival Time</th>
                    <th>Burst Time</th>
                    <th class="priority-col" style="display: none;">Priority</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <!-- Rows will be added dynamically -->
            </tbody>
        </table>
        
        <div class="actions">
            <button id="add-process-btn">Add Process</button>
            <button id="run-btn">Run Scheduler</button>
        </div>
        
        <div id="results" style="display: none;">
            <h2>Results</h2>
            
            <h3>Gantt Chart</h3>
            <div id="gantt-chart" class="gantt-container"></div>
            
            <h3>Metrics</h3>
            <table id="metrics-table">
                <thead>
                    <tr>
                        <th>PID</th>
                        <th>Completion Time</th>
                        <th>Turnaround Time</th>
                        <th>Waiting Time</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Results populated here -->
                </tbody>
            </table>
            
            <p class="avg-wait">Average Waiting Time: <span id="avg-wt-value"></span></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
